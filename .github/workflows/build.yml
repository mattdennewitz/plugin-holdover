name: build
on: [push, pull_request]
jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: pluginval
        run: |
          curl -sL "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip" -o pluginval.zip
          unzip -q pluginval.zip
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 8 --validate-in-process \
            "build/Source/Holdover_artefacts/Release/VST3/Holdover.vst3"
