name: build
on: pull_request

# Cancel an in-flight run when new commits land on the same ref (matches the fleet
# standard in plugin-subharmonic-osc).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    runs-on: macos-14
    env:
      # CPM caches fetched dependency sources here so JUCE/Catch2 aren't re-cloned each run.
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cpm-cache
      # Use the GitHub Actions cache as sccache's storage backend.
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v4

      # Persist the CPM source cache (JUCE 8.0.4, Catch2) keyed on the files that pin versions.
      - name: Cache CPM sources
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cpm-cache
          key: cpm-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'tests/CMakeLists.txt') }}
          restore-keys: |
            cpm-${{ runner.os }}-

      # sccache (GHA backend) — house standard, matching plugin-subharmonic-osc. Only the
      # C/CXX launchers are set: sccache does not cache Objective-C++ (.mm), so JUCE's macOS
      # modules compile uncached; the C/C++ objects (incl. the bulk of JUCE) are cached.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Configure
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: pluginval
        run: |
          curl -sL "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip" -o pluginval.zip
          unzip -q pluginval.zip
          ./pluginval.app/Contents/MacOS/pluginval --strictness-level 10 --validate-in-process \
            "build/Source/Holdover_artefacts/Release/VST3/Holdover.vst3"
